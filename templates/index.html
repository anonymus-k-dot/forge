<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        body {
            background-color: #0d0e10;
            color: #e3e5ed;
            font-family: 'Inter', sans-serif;
        }
        .serif-display {
            font-family: 'Noto Serif', serif;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0d0e10; }
        ::-webkit-scrollbar-thumb { background: #23262b; }
        
        .brand-giant {
            font-size: clamp(2rem, 18vw, 24rem);
            line-height: 0.8;
            letter-spacing: -0.05em;
        }
    
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<script>
document.querySelector("button").addEventListener("click", async () => {
    const textarea = document.querySelector("textarea");
    const outputDiv = document.querySelector(".serif-display");

    const prompt = textarea.value;

    if (!prompt.trim()) {
        alert("Enter a prompt first");
        return;
    }

    outputDiv.innerText = "Processing...";

    try {
        const response = await fetch("/enhance", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt: prompt })
        });

        const data = await response.json();

        if (data.result) {
            outputDiv.innerText = data.result;
        } else {
            outputDiv.innerText = "Error: " + (data.error || "Unknown error");
        }

    } catch (error) {
        outputDiv.innerText = "Request failed";
        console.error(error);
    }
});
</script>
