  .output-section .definition-row{display:grid;grid-template-columns:minmax(7rem,.4fr) 1fr;gap:1rem;border-top:1px solid rgba(255,255,255,.06);padding-top:.75rem;margin-top:.75rem}
  .definition-row strong{color:#8c919b;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase}
  .definition-row span{color:#d9dce5;line-height:1.65}
  .skeleton-line{height:.85rem;border-radius:999px;background:linear-gradient(90deg,rgba(255,255,255,.06),rgba(255,255,255,.14),rgba(255,255,255,.06));background-size:200% 100%;animation:shimmer 1.4s infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  @media (max-width:1023px){
    .output-shell{position:relative;top:auto;min-height:430px;max-height:none}
    .output-body{max-height:70vh}

<!-- ═══════════════════════════════════════════
     Enhance / Copy logic  (moved to end of body)
═══════════════════════════════════════════ -->
<script>
  const btn  = document.querySelector(".enhance-btn");
  const ta   = document.querySelector("textarea");
  const out  = document.getElementById("output");
  const copy = document.querySelector(".copy-btn");
  const copyLabel = document.querySelector(".copy-label");
  const metaBar = document.getElementById("output-meta");
  const templateChip = document.getElementById("template-chip");
  const domainChip = document.getElementById("domain-chip");
  const confidenceChip = document.getElementById("confidence-chip");
  let latestOutput = "";

  function setEnhancing(isEnhancing) {
    btn.disabled = isEnhancing;
    btn.classList.toggle("opacity-60", isEnhancing);
    btn.classList.toggle("cursor-wait", isEnhancing);
    btn.querySelector("span").textContent = isEnhancing ? "forging prompt" : "enhance protocol";
  }

  function setMeta(data) {
    templateChip.textContent = data.template || data.template_id || "Template selected";
    domainChip.textContent = data.domain ? `Domain ${data.domain}` : "Domain selected";
    confidenceChip.textContent = data.confidence ? `Confidence ${data.confidence}` : "Confidence ready";
    metaBar.classList.remove("hidden");
  }

  function renderLoading() {
    latestOutput = "";
    metaBar.classList.add("hidden");
    out.className = "output-body";
    out.replaceChildren();

    const section = document.createElement("article");
    section.className = "output-section";

    const heading = document.createElement("div");
    heading.className = "skeleton-line";
    heading.style.width = "38%";
    heading.style.marginBottom = "1.3rem";
    section.appendChild(heading);

    [92, 78, 86, 64, 72].forEach((width) => {
      const line = document.createElement("div");
      line.className = "skeleton-line";
      line.style.width = `${width}%`;
      line.style.marginTop = ".8rem";
      section.appendChild(line);
    });

    out.appendChild(section);
  }

  function renderMessage(title, message) {
    latestOutput = "";
    metaBar.classList.add("hidden");
    out.className = "output-body output-empty";
    out.replaceChildren();

    const empty = document.createElement("div");
    empty.className = "empty-state";
    const h = document.createElement("p");
    h.className = "serif-display text-xl leading-relaxed text-[#f0f1f5]";
    h.textContent = title;
    const p = document.createElement("p");
    p.className = "text-sm leading-relaxed mt-3 text-[#8f949e]";
    p.textContent = message;
    empty.append(h, p);
    out.appendChild(empty);
  }

  function titleCase(value) {
    return value
      .toLowerCase()
      .replace(/\b[a-z]/g, (char) => char.toUpperCase())
      .replace(/\bAi\b/g, "AI")
      .replace(/\bApi\b/g, "API")
      .replace(/\bPrd\b/g, "PRD");
  }

  function extractHeading(line) {
    const markdown = line.match(/^#{1,6}\s+(.+)$/);
    if (markdown) return markdown[1].replace(/:$/, "").trim();

    const numbered = line.match(/^(\d+(?:\.\d+)*[.)]?)\s+(.+)$/);
    if (numbered) {
      const label = numbered[1].replace(/[.)]$/, ".");
      const text = numbered[2].replace(/:$/, "").trim();
      const letters = text.replace(/[^A-Za-z]/g, "");
      if (letters && letters === letters.toUpperCase()) return `${label} ${titleCase(text)}`;
      return null;
    }

    const clean = line.replace(/:$/, "").trim();
    const letters = clean.replace(/[^A-Za-z]/g, "");
    if (line.endsWith(":") && clean.length <= 72) return clean;
    if (clean.length <= 72 && letters.length > 3 && letters === letters.toUpperCase()) return titleCase(clean);
    return null;
  }

  function appendParagraph(section, text) {
    const p = document.createElement("p");
    p.textContent = text;
    section.appendChild(p);
  }

  function appendDefinition(section, key, value) {
    const row = document.createElement("div");
    row.className = "definition-row";
    const strong = document.createElement("strong");
    strong.textContent = key;
    const span = document.createElement("span");
    span.textContent = value;
    row.append(strong, span);
    section.appendChild(row);
  }

  function createSection(fragment, title) {
    const section = document.createElement("article");
    section.className = "output-section";
    const h = document.createElement("h3");
    h.textContent = title;
    section.appendChild(h);
    fragment.appendChild(section);
    return section;
  }

  function createBriefGrid(fragment) {
    let grid = fragment.querySelector?.(".output-brief-grid");
    if (grid) return grid;
    grid = document.createElement("dl");
    grid.className = "output-brief-grid";
    fragment.appendChild(grid);
    return grid;
  }

  function appendBrief(fragment, key, value) {
    const grid = createBriefGrid(fragment);
    const item = document.createElement("div");
    item.className = "output-brief";
    const dt = document.createElement("dt");
    dt.textContent = key;
    const dd = document.createElement("dd");
    dd.textContent = value;
    item.append(dt, dd);
    grid.appendChild(item);
  }

  function renderOutput(text) {
    latestOutput = text;
    out.className = "output-body";
    out.replaceChildren();

    const fragment = document.createDocumentFragment();
    const lines = text.replace(/\r\n/g, "\n").split("\n");
    let section = null;
    let list = null;
    let paragraph = [];

    function ensureSection() {
      if (!section) section = createSection(fragment, "Prompt Blueprint");
      return section;
    }

    function flushParagraph() {
      if (!paragraph.length) return;
      appendParagraph(ensureSection(), paragraph.join(" "));
      paragraph = [];
    }

    function clearList() {
      list = null;
    }

    lines.forEach((rawLine) => {
      const line = rawLine.trim();
      if (!line) {
        flushParagraph();
        clearList();
        return;
      }

      const heading = extractHeading(line);
      if (heading) {
        flushParagraph();
        clearList();
        section = createSection(fragment, heading);
        return;
      }

      const keyValue = line.match(/^([A-Za-z][A-Za-z /_-]{1,28}):\s+(.+)$/);
      if (keyValue) {
        flushParagraph();
        clearList();
        const key = keyValue[1].trim();
        const value = keyValue[2].trim();
        if (!section && /^(role|task|objective|context|audience)$/i.test(key)) {
          appendBrief(fragment, key, value);
        } else {
          appendDefinition(ensureSection(), key, value);
        }
        return;
      }

      const bullet = line.match(/^[-*\u2022]\s+(.+)$/);
      const numbered = line.match(/^\d+[\.)]\s+(.+)$/);
      if (bullet || numbered) {
        flushParagraph();
        const ordered = Boolean(numbered);
        if (!list || (ordered && list.tagName !== "OL") || (!ordered && list.tagName !== "UL")) {
          list = document.createElement(ordered ? "ol" : "ul");
          ensureSection().appendChild(list);
        }
        const li = document.createElement("li");
        li.textContent = (bullet || numbered)[1].trim();
        list.appendChild(li);
        return;
      }

      clearList();
      paragraph.push(line);
    });

    flushParagraph();
    if (!fragment.childNodes.length) renderMessage("No output returned", "Try a more specific raw prompt.");
    else out.appendChild(fragment);
  }

  btn.addEventListener("click", async () => {
    const p = ta.value;
    if (!p.trim()) { alert("Enter a prompt first"); return; }
    setEnhancing(true);
    renderLoading();
    try {
      const r = await fetch("/enhance", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({prompt:p}) });
      const d = await r.json();
      if (!r.ok || d.error) throw new Error(d.error || `Request failed with status ${r.status}`);
      setMeta(d);
      renderOutput(d.result || d.enhanced_prompt || "");
    } catch(e) {
      renderMessage("Request failed", e.message || "The enhancement service did not respond.");
      console.error(e);
    } finally {
      setEnhancing(false);
    }
  });

  copy.addEventListener("click", async () => {
    if (!latestOutput.trim()) return;
    try {
      await navigator.clipboard.writeText(latestOutput);
      copyLabel.textContent = "Copied";
      copy.querySelector(".material-symbols-outlined").textContent = "check";
      setTimeout(() => {
        copyLabel.textContent = "Copy";
        copy.querySelector(".material-symbols-outlined").textContent = "content_copy";
      }, 1400);
    } catch (e) {
      console.error(e);
      alert("Copy failed");
    }
  });
</script>

<!-- ═══════════════════════════════════════════════
     SplashCursor — pure WebGL fluid simulation
     FIX: resizeCanvas() called before initFramebuffers()
          render loop starts immediately, not on first mousemove
═══════════════════════════════════════════════ -->
<script>
(function initSplashCursor() {

  const CONFIG = {
    SIM_RESOLUTION:       128,
    DYE_RESOLUTION:       1440,
    DENSITY_DISSIPATION:  3.5,
    VELOCITY_DISSIPATION: 2,
    PRESSURE:             0.1,
    PRESSURE_ITERATIONS:  20,
    CURL:                 3,
    SPLAT_RADIUS:         0.2,
    SPLAT_FORCE:          6000,
    SHADING:              true,
    COLOR_UPDATE_SPEED:   10,
    TRANSPARENT:          true,
  };

  function Pointer() {
    this.id = -1;
    this.texcoordX = 0; this.texcoordY = 0;
    this.prevTexcoordX = 0; this.prevTexcoordY = 0;
    this.deltaX = 0; this.deltaY = 0;
    this.down = false; this.moved = false;
    this.color = [0,0,0];
  }

  // ── Canvas is already in DOM, grab it directly ──
  const canvas = document.getElementById('fluid-canvas');
  let pointers = [new Pointer()];

  /* ── WebGL context ── */
  function getWebGLContext(canvas) {
    const params = { alpha:true, depth:false, stencil:false, antialias:false, preserveDrawingBuffer:false };
    let gl = canvas.getContext('webgl2', params);
    const isWebGL2 = !!gl;
    if (!isWebGL2) gl = canvas.getContext('webgl', params) || canvas.getContext('experimental-webgl', params);
    let halfFloat, supportLinearFiltering;
    if (isWebGL2) {
      gl.getExtension('EXT_color_buffer_float');
      supportLinearFiltering = gl.getExtension('OES_texture_float_linear');
    } else {
      halfFloat = gl.getExtension('OES_texture_half_float');
      supportLinearFiltering = gl.getExtension('OES_texture_half_float_linear');
    }
    gl.clearColor(0,0,0,1);
    const halfFloatTexType = isWebGL2 ? gl.HALF_FLOAT : (halfFloat && halfFloat.HALF_FLOAT_OES);
    let formatRGBA, formatRG, formatR;
    if (isWebGL2) {
      formatRGBA = getSupportedFormat(gl, gl.RGBA16F, gl.RGBA, halfFloatTexType);
      formatRG   = getSupportedFormat(gl, gl.RG16F,   gl.RG,   halfFloatTexType);
      formatR    = getSupportedFormat(gl, gl.R16F,    gl.RED,  halfFloatTexType);
    } else {
      formatRGBA = getSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType);
      formatRG   = getSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType);
      formatR    = getSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType);
    }
    return { gl, ext:{ formatRGBA, formatRG, formatR, halfFloatTexType, supportLinearFiltering } };
  }

  function getSupportedFormat(gl, internalFormat, format, type) {
    if (!supportRenderTextureFormat(gl, internalFormat, format, type)) {
      if (internalFormat === gl.R16F)  return getSupportedFormat(gl, gl.RG16F,   gl.RG,   type);
      if (internalFormat === gl.RG16F) return getSupportedFormat(gl, gl.RGBA16F, gl.RGBA, type);
      return null;
    }
    return { internalFormat, format };
  }

  function supportRenderTextureFormat(gl, internalFormat, format, type) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, 4, 4, 0, format, type, null);
    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    return gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  }

  const { gl, ext } = getWebGLContext(canvas);
  if (!ext.supportLinearFiltering) { CONFIG.DYE_RESOLUTION = 256; CONFIG.SHADING = false; }

  /* ── shader helpers ── */
  function compileShader(type, source, keywords) {
    if (keywords) source = keywords.map(k => '#define ' + k + '\n').join('') + source;
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source); gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(shader));
    return shader;
  }

  function createProgram(vs, fs) {
    const p = gl.createProgram();
    gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
    return p;
  }

  function getUniforms(program) {
    const u = {};
    const n = gl.getProgramParameter(program, gl.ACTIVE_UNIFORMS);
    for (let i = 0; i < n; i++) {
      const name = gl.getActiveUniform(program, i).name;
      u[name] = gl.getUniformLocation(program, name);
    }
    return u;
  }

  class Program {
    constructor(vs, fs) {
      this.program  = createProgram(vs, fs);
      this.uniforms = getUniforms(this.program);
    }
    bind() { gl.useProgram(this.program); }
  }

  class Material {
    constructor(vs, fsSrc) {
      this.vs = vs; this.fsSrc = fsSrc;
      this.programs = {}; this.activeProgram = null; this.uniforms = {};
    }
    setKeywords(kw) {
      const hash = kw.reduce((h,k) => h + hashCode(k), 0);
      if (!this.programs[hash]) {
        const fs = compileShader(gl.FRAGMENT_SHADER, this.fsSrc, kw);
        this.programs[hash] = createProgram(this.vs, fs);
      }
      if (this.programs[hash] === this.activeProgram) return;
      this.activeProgram = this.programs[hash];
      this.uniforms = getUniforms(this.activeProgram);
    }
    bind() { gl.useProgram(this.activeProgram); }
  }

  /* ── Vertex shader ── */
  const baseVS = compileShader(gl.VERTEX_SHADER, `
    precision highp float;
    attribute vec2 aPosition;
    varying vec2 vUv,vL,vR,vT,vB;
    uniform vec2 texelSize;
    void main(){
      vUv=aPosition*.5+.5;
      vL=vUv-vec2(texelSize.x,0);vR=vUv+vec2(texelSize.x,0);
      vT=vUv+vec2(0,texelSize.y);vB=vUv-vec2(0,texelSize.y);
      gl_Position=vec4(aPosition,0,1);
    }
  `);

  /* ── Fragment shaders ── */
  const copyFS = compileShader(gl.FRAGMENT_SHADER,`
    precision mediump float;precision mediump sampler2D;
    varying highp vec2 vUv;uniform sampler2D uTexture;
    void main(){gl_FragColor=texture2D(uTexture,vUv);}
  `);
  const clearFS = compileShader(gl.FRAGMENT_SHADER,`
    precision mediump float;precision mediump sampler2D;
    varying highp vec2 vUv;uniform sampler2D uTexture;uniform float value;
    void main(){gl_FragColor=value*texture2D(uTexture,vUv);}
  `);
  const splatFS = compileShader(gl.FRAGMENT_SHADER,`
    precision highp float;precision highp sampler2D;
    varying vec2 vUv;uniform sampler2D uTarget;
    uniform float aspectRatio;uniform vec3 color;uniform vec2 point;uniform float radius;
    void main(){
      vec2 p=vUv-point;p.x*=aspectRatio;
      vec3 splat=exp(-dot(p,p)/radius)*color;
      gl_FragColor=vec4(texture2D(uTarget,vUv).xyz+splat,1);
    }
  `);
  const advectionFS = compileShader(gl.FRAGMENT_SHADER,`
    precision highp float;precision highp sampler2D;
    varying vec2 vUv;uniform sampler2D uVelocity,uSource;
    uniform vec2 texelSize,dyeTexelSize;uniform float dt,dissipation;
    vec4 bilerp(sampler2D sam,vec2 uv,vec2 tsize){
      vec2 st=uv/tsize-.5,iuv=floor(st),fuv=fract(st);
      fuv*=fuv*(3.-2.*fuv);
      vec4 a=texture2D(sam,(iuv+vec2(.5,.5))*tsize);
      vec4 b=texture2D(sam,(iuv+vec2(1.5,.5))*tsize);
      vec4 c=texture2D(sam,(iuv+vec2(.5,1.5))*tsize);
      vec4 d=texture2D(sam,(iuv+vec2(1.5,1.5))*tsize);
      return mix(mix(a,b,fuv.x),mix(c,d,fuv.x),fuv.y);
    }
    void main(){
      #ifdef MANUAL_FILTERING
        vec2 coord=vUv-dt*bilerp(uVelocity,vUv,texelSize).xy*texelSize;
        vec4 result=bilerp(uSource,coord,dyeTexelSize);
      #else
        vec2 coord=vUv-dt*texture2D(uVelocity,vUv).xy*texelSize;
        vec4 result=texture2D(uSource,coord);
      #endif
      gl_FragColor=result/(1.+dissipation*dt);
    }
  `, ext.supportLinearFiltering ? null : ['MANUAL_FILTERING']);
  const divergenceFS = compileShader(gl.FRAGMENT_SHADER,`
    precision mediump float;precision mediump sampler2D;
    varying highp vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVelocity;
    void main(){
      float L=texture2D(uVelocity,vL).x,R=texture2D(uVelocity,vR).x;
      float T=texture2D(uVelocity,vT).y,B=texture2D(uVelocity,vB).y;
      vec2 C=texture2D(uVelocity,vUv).xy;
      if(vL.x<0.)L=-C.x;if(vR.x>1.)R=-C.x;if(vT.y>1.)T=-C.y;if(vB.y<0.)B=-C.y;
      gl_FragColor=vec4(.5*(R-L+T-B),0,0,1);
    }
  `);
  const curlFS = compileShader(gl.FRAGMENT_SHADER,`
    precision mediump float;precision mediump sampler2D;
    varying highp vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVelocity;
    void main(){
      float L=texture2D(uVelocity,vL).y,R=texture2D(uVelocity,vR).y;
      float T=texture2D(uVelocity,vT).x,B=texture2D(uVelocity,vB).x;
      gl_FragColor=vec4(.5*(R-L-T+B),0,0,1);
    }
  `);
  const vorticityFS = compileShader(gl.FRAGMENT_SHADER,`
    precision highp float;precision highp sampler2D;
    varying vec2 vUv,vL,vR,vT,vB;uniform sampler2D uVelocity,uCurl;
    uniform float curl,dt;
    void main(){
      float L=texture2D(uCurl,vL).x,R=texture2D(uCurl,vR).x;
      float T=texture2D(uCurl,vT).x,B=texture2D(uCurl,vB).x;
      float C=texture2D(uCurl,vUv).x;
      vec2 force=.5*vec2(abs(T)-abs(B),abs(R)-abs(L));
      force/=length(force)+.0001;force*=curl*C;force.y*=-1.;
      vec2 vel=texture2D(uVelocity,vUv).xy+force*dt;
      vel=min(max(vel,-1000.),1000.);
      gl_FragColor=vec4(vel,0,1);
    }
  `);
  const pressureFS = compileShader(gl.FRAGMENT_SHADER,`
    precision mediump float;precision mediump sampler2D;
    varying highp vec2 vUv,vL,vR,vT,vB;
    uniform sampler2D uPressure,uDivergence;
    void main(){
      float L=texture2D(uPressure,vL).x,R=texture2D(uPressure,vR).x;
      float T=texture2D(uPressure,vT).x,B=texture2D(uPressure,vB).x;
      float div=texture2D(uDivergence,vUv).x;
      gl_FragColor=vec4((L+R+B+T-div)*.25,0,0,1);
    }
  `);
  const gradSubFS = compileShader(gl.FRAGMENT_SHADER,`
    precision mediump float;precision mediump sampler2D;
    varying highp vec2 vUv,vL,vR,vT,vB;
    uniform sampler2D uPressure,uVelocity;
    void main(){
      float L=texture2D(uPressure,vL).x,R=texture2D(uPressure,vR).x;
      float T=texture2D(uPressure,vT).x,B=texture2D(uPressure,vB).x;
      vec2 vel=texture2D(uVelocity,vUv).xy-vec2(R-L,T-B);
      gl_FragColor=vec4(vel,0,1);
    }
  `);
  const displayFSSrc = `
    precision highp float;precision highp sampler2D;
    varying vec2 vUv,vL,vR,vT,vB;
    uniform sampler2D uTexture;uniform vec2 texelSize;
    void main(){
      vec3 c=texture2D(uTexture,vUv).rgb;
      #ifdef SHADING
        vec3 lc=texture2D(uTexture,vL).rgb,rc=texture2D(uTexture,vR).rgb;
        vec3 tc=texture2D(uTexture,vT).rgb,bc=texture2D(uTexture,vB).rgb;
        float dx=length(rc)-length(lc),dy=length(tc)-length(bc);
        vec3 n=normalize(vec3(dx,dy,length(texelSize)));
        c*=clamp(dot(n,vec3(0,0,1))+.7,.7,1.);
      #endif
      float a=max(c.r,max(c.g,c.b));
      gl_FragColor=vec4(c,a);
    }
  `;

  /* ── Programs ── */
  const copyProg  = new Program(baseVS, copyFS);
  const clearProg = new Program(baseVS, clearFS);
  const splatProg = new Program(baseVS, splatFS);
  const advProg   = new Program(baseVS, advectionFS);
  const divProg   = new Program(baseVS, divergenceFS);
  const curlProg  = new Program(baseVS, curlFS);
  const vortProg  = new Program(baseVS, vorticityFS);
  const presProg  = new Program(baseVS, pressureFS);
  const gradProg  = new Program(baseVS, gradSubFS);
  const displayMat = new Material(baseVS, displayFSSrc);

  /* ── Blit quad ── */
  gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,-1,1,1,1,1,-1]), gl.STATIC_DRAW);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, gl.createBuffer());
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0,1,2,0,2,3]), gl.STATIC_DRAW);
  gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
  gl.enableVertexAttribArray(0);

  function blit(target, clear=false) {
    if (target == null) {
      gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight);
      gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    } else {
      gl.viewport(0,0,target.width,target.height);
      gl.bindFramebuffer(gl.FRAMEBUFFER,target.fbo);
    }
    if (clear) { gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT); }
    gl.drawElements(gl.TRIANGLES,6,gl.UNSIGNED_SHORT,0);
  }

  /* ── FBO helpers ── */
  function createFBO(w,h,internalFormat,format,type,param) {
    gl.activeTexture(gl.TEXTURE0);
    const tex=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,param);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,param);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D,0,internalFormat,w,h,0,format,type,null);
    const fbo=gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
    gl.viewport(0,0,w,h); gl.clear(gl.COLOR_BUFFER_BIT);
    return {
      texture:tex,fbo,width:w,height:h,
      texelSizeX:1/w,texelSizeY:1/h,
      attach(id){ gl.activeTexture(gl.TEXTURE0+id); gl.bindTexture(gl.TEXTURE_2D,tex); return id; }
    };
  }

  function createDoubleFBO(w,h,iF,f,t,p) {
    let a=createFBO(w,h,iF,f,t,p), b=createFBO(w,h,iF,f,t,p);
    return {
      width:w,height:h,texelSizeX:a.texelSizeX,texelSizeY:a.texelSizeY,
      get read(){return a;},set read(v){a=v;},
      get write(){return b;},set write(v){b=v;},
      swap(){let t=a;a=b;b=t;}
    };
  }

  function resizeFBO(target,w,h,iF,f,t,p) {
    const n=createFBO(w,h,iF,f,t,p);
    copyProg.bind();
    gl.uniform1i(copyProg.uniforms.uTexture,target.attach(0));
    blit(n); return n;
  }

  function resizeDoubleFBO(target,w,h,iF,f,t,p) {
    if(target.width===w&&target.height===h) return target;
    target.read=resizeFBO(target.read,w,h,iF,f,t,p);
    target.write=createFBO(w,h,iF,f,t,p);
    target.width=w;target.height=h;
    target.texelSizeX=1/w;target.texelSizeY=1/h;
    return target;
  }

  let dye,velocity,divergence,curl,pressure;

  function initFramebuffers() {
    const simRes=getResolution(CONFIG.SIM_RESOLUTION);
    const dyeRes=getResolution(CONFIG.DYE_RESOLUTION);
    const tt=ext.halfFloatTexType,rgba=ext.formatRGBA,rg=ext.formatRG,r=ext.formatR;
    const filt=ext.supportLinearFiltering?gl.LINEAR:gl.NEAREST;
    gl.disable(gl.BLEND);
    if(!dye) dye=createDoubleFBO(dyeRes.width,dyeRes.height,rgba.internalFormat,rgba.format,tt,filt);
    else dye=resizeDoubleFBO(dye,dyeRes.width,dyeRes.height,rgba.internalFormat,rgba.format,tt,filt);
    if(!velocity) velocity=createDoubleFBO(simRes.width,simRes.height,rg.internalFormat,rg.format,tt,filt);
    else velocity=resizeDoubleFBO(velocity,simRes.width,simRes.height,rg.internalFormat,rg.format,tt,filt);
    divergence=createFBO(simRes.width,simRes.height,r.internalFormat,r.format,tt,gl.NEAREST);
    curl=createFBO(simRes.width,simRes.height,r.internalFormat,r.format,tt,gl.NEAREST);
    pressure=createDoubleFBO(simRes.width,simRes.height,r.internalFormat,r.format,tt,gl.NEAREST);
  }

  function getResolution(res) {
    let ar=gl.drawingBufferWidth/gl.drawingBufferHeight;
    if(ar<1) ar=1/ar;
    const min=Math.round(res),max=Math.round(res*ar);
    return gl.drawingBufferWidth>gl.drawingBufferHeight?{width:max,height:min}:{width:min,height:max};
  }

  /* ── utilities ── */
  function scaleByPixelRatio(v){ return Math.floor(v*(window.devicePixelRatio||1)); }
  function hashCode(s){ let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return h; }
  function wrap(v,min,max){ const r=max-min;return r===0?min:((v-min)%r)+min; }

  function generateColor(){
    const c=HSVtoRGB(Math.random(),1,1);
    return {r:c.r*.15,g:c.g*.15,b:c.b*.15};
  }
  function HSVtoRGB(h,s,v){
    const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
    switch(i%6){
      case 0:return{r:v,g:t,b:p};case 1:return{r:q,g:v,b:p};case 2:return{r:p,g:v,b:t};
      case 3:return{r:p,g:q,b:v};case 4:return{r:t,g:p,b:v};case 5:return{r:v,g:p,b:q};
    }
  }

  function correctRadius(radius){
    const ar=canvas.width/canvas.height;
    return ar>1?radius*ar:radius;
  }
  function correctDeltaX(d){const ar=canvas.width/canvas.height;return ar<1?d*ar:d;}
  function correctDeltaY(d){const ar=canvas.width/canvas.height;return ar>1?d/ar:d;}

  /* ── pointer data helpers ── */
  function updatePointerDownData(p,id,x,y){
    p.id=id;p.down=true;p.moved=false;
    p.texcoordX=x/canvas.width;p.texcoordY=1-y/canvas.height;
    p.prevTexcoordX=p.texcoordX;p.prevTexcoordY=p.texcoordY;
    p.deltaX=0;p.deltaY=0;p.color=generateColor();
  }
  function updatePointerMoveData(p,x,y,color){
    p.prevTexcoordX=p.texcoordX;p.prevTexcoordY=p.texcoordY;
    p.texcoordX=x/canvas.width;p.texcoordY=1-y/canvas.height;
    p.deltaX=correctDeltaX(p.texcoordX-p.prevTexcoordX);
    p.deltaY=correctDeltaY(p.texcoordY-p.prevTexcoordY);
    p.moved=Math.abs(p.deltaX)>0||Math.abs(p.deltaY)>0;
    p.color=color;
  }
  function updatePointerUpData(p){p.down=false;}

  /* ── splat ── */
  function splat(x,y,dx,dy,color){
    splatProg.bind();
    gl.uniform1i(splatProg.uniforms.uTarget,velocity.read.attach(0));
    gl.uniform1f(splatProg.uniforms.aspectRatio,canvas.width/canvas.height);
    gl.uniform2f(splatProg.uniforms.point,x,y);
    gl.uniform3f(splatProg.uniforms.color,dx,dy,0);
    gl.uniform1f(splatProg.uniforms.radius,correctRadius(CONFIG.SPLAT_RADIUS/100));
    blit(velocity.write); velocity.swap();
    gl.uniform1i(splatProg.uniforms.uTarget,dye.read.attach(0));
    gl.uniform3f(splatProg.uniforms.color,color.r,color.g,color.b);
    blit(dye.write); dye.swap();
  }
  function splatPointer(p){
    splat(p.texcoordX,p.texcoordY,p.deltaX*CONFIG.SPLAT_FORCE,p.deltaY*CONFIG.SPLAT_FORCE,p.color);
  }
  function clickSplat(p){
    const c=generateColor();c.r*=10;c.g*=10;c.b*=10;
    splat(p.texcoordX,p.texcoordY,10*(Math.random()-.5),30*(Math.random()-.5),c);
  }

  /* ── simulation step ── */
  function step(dt){
    gl.disable(gl.BLEND);
    curlProg.bind();
    gl.uniform2f(curlProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
    gl.uniform1i(curlProg.uniforms.uVelocity,velocity.read.attach(0));
    blit(curl);

    vortProg.bind();
    gl.uniform2f(vortProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
    gl.uniform1i(vortProg.uniforms.uVelocity,velocity.read.attach(0));
    gl.uniform1i(vortProg.uniforms.uCurl,curl.attach(1));
    gl.uniform1f(vortProg.uniforms.curl,CONFIG.CURL);
    gl.uniform1f(vortProg.uniforms.dt,dt);
    blit(velocity.write); velocity.swap();

    divProg.bind();
    gl.uniform2f(divProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
    gl.uniform1i(divProg.uniforms.uVelocity,velocity.read.attach(0));
    blit(divergence);

    clearProg.bind();
    gl.uniform1i(clearProg.uniforms.uTexture,pressure.read.attach(0));
    gl.uniform1f(clearProg.uniforms.value,CONFIG.PRESSURE);
    blit(pressure.write); pressure.swap();

    presProg.bind();
    gl.uniform2f(presProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
    gl.uniform1i(presProg.uniforms.uDivergence,divergence.attach(0));
    for(let i=0;i<CONFIG.PRESSURE_ITERATIONS;i++){
      gl.uniform1i(presProg.uniforms.uPressure,pressure.read.attach(1));
      blit(pressure.write); pressure.swap();
    }

    gradProg.bind();
    gl.uniform2f(gradProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
    gl.uniform1i(gradProg.uniforms.uPressure,pressure.read.attach(0));
    gl.uniform1i(gradProg.uniforms.uVelocity,velocity.read.attach(1));
    blit(velocity.write); velocity.swap();

    advProg.bind();
    gl.uniform2f(advProg.uniforms.texelSize,velocity.texelSizeX,velocity.texelSizeY);
    if(!ext.supportLinearFiltering) gl.uniform2f(advProg.uniforms.dyeTexelSize,velocity.texelSizeX,velocity.texelSizeY);
    const velId=velocity.read.attach(0);
    gl.uniform1i(advProg.uniforms.uVelocity,velId);
    gl.uniform1i(advProg.uniforms.uSource,velId);
    gl.uniform1f(advProg.uniforms.dt,dt);
    gl.uniform1f(advProg.uniforms.dissipation,CONFIG.VELOCITY_DISSIPATION);
    blit(velocity.write); velocity.swap();

    if(!ext.supportLinearFiltering) gl.uniform2f(advProg.uniforms.dyeTexelSize,dye.texelSizeX,dye.texelSizeY);
    gl.uniform1i(advProg.uniforms.uVelocity,velocity.read.attach(0));
    gl.uniform1i(advProg.uniforms.uSource,dye.read.attach(1));
    gl.uniform1f(advProg.uniforms.dissipation,CONFIG.DENSITY_DISSIPATION);
    blit(dye.write); dye.swap();
  }

  function render(target){
    gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
    gl.enable(gl.BLEND);
    const w=target==null?gl.drawingBufferWidth:target.width;
    const h=target==null?gl.drawingBufferHeight:target.height;
    displayMat.bind();
    if(CONFIG.SHADING) gl.uniform2f(displayMat.uniforms.texelSize,1/w,1/h);
    gl.uniform1i(displayMat.uniforms.uTexture,dye.read.attach(0));
    blit(target);
  }

  /* ── Canvas resize ── */
  function resizeCanvas(){
    const w=scaleByPixelRatio(canvas.clientWidth),h=scaleByPixelRatio(canvas.clientHeight);
    if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;return true;}
    return false;
  }

  // ── FIXED: initialize with a real color object, not [0,0,0] array ──
  pointers[0].color = generateColor();

  /* ── FIXED: resize canvas FIRST, then init framebuffers ── */
  displayMat.setKeywords(CONFIG.SHADING?['SHADING']:[]);
  resizeCanvas();          // ← set correct dimensions before creating FBOs
  initFramebuffers();

  let lastUpdateTime=Date.now(), colorUpdateTimer=0;

  /* ── main loop — starts immediately, no longer gated on first mousemove ── */
  function updateFrame(){
    const now=Date.now();
    let dt=Math.min((now-lastUpdateTime)/1000,0.016666);
    lastUpdateTime=now;
    if(resizeCanvas()) initFramebuffers();   // re-init only on actual resize
    colorUpdateTimer+=dt*CONFIG.COLOR_UPDATE_SPEED;
    if(colorUpdateTimer>=1){
      colorUpdateTimer=wrap(colorUpdateTimer,0,1);
      pointers.forEach(p=>{ p.color=generateColor(); });
    }
    pointers.forEach(p=>{ if(p.moved){p.moved=false;splatPointer(p);} });
    step(dt);
    render(null);
    requestAnimationFrame(updateFrame);
  }

  // ── FIXED: kick off the loop right away ──
  requestAnimationFrame(updateFrame);

  /* ── Input events (splat interaction only) ── */
  window.addEventListener('mousedown', e => {
    const p=pointers[0];
    updatePointerDownData(p,-1,scaleByPixelRatio(e.clientX),scaleByPixelRatio(e.clientY));
    clickSplat(p);
  });

  window.addEventListener('mousemove', e => {
    const p=pointers[0];
    // always pass a valid color — p.color may still be stale on first move
    if(!p.color || Array.isArray(p.color)) p.color = generateColor();
    updatePointerMoveData(p,scaleByPixelRatio(e.clientX),scaleByPixelRatio(e.clientY),p.color);
  });

  window.addEventListener('touchstart', e => {
    const p=pointers[0],t=e.targetTouches[0];
    updatePointerDownData(p,t.identifier,scaleByPixelRatio(t.clientX),scaleByPixelRatio(t.clientY));
    clickSplat(p);
  });

  window.addEventListener('touchmove', e => {
    const p=pointers[0],t=e.targetTouches[0];
    updatePointerMoveData(p,scaleByPixelRatio(t.clientX),scaleByPixelRatio(t.clientY),p.color);
  },{passive:false});

  window.addEventListener('touchend', () => updatePointerUpData(pointers[0]));

  /* ── WebGL context loss recovery ── */
  canvas.addEventListener('webglcontextlost', e => {
    e.preventDefault();
    console.warn('WebGL context lost — will restore on regain');
  });

  canvas.addEventListener('webglcontextrestored', () => {
    initFramebuffers();
    requestAnimationFrame(updateFrame);
  });

})();
</script>

</body>
</html>
